async function boot() {

    loginAsUser(savedUser);
    return;
  }

function formatTime(ts) {
  if (!ts) return '??:??';
  return new Date(ts).toLocaleTimeString('et-EE', {hour: '2-digit', minute: '2-digit', hour12: false});
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const today = new Date();
  const yesterday = new Date(today);
  yesterday.setDate(today.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return '── TÄNA ──';
  if (d.toDateString() === yesterday.toDateString()) return '── EILE ──';
  return '── ' + d.toLocaleDateString('et-EE', {day:'numeric', month:'long', year:'numeric'}).toUpperCase() + ' ──';
}

function escapeHtml(text) {

// ════════════════════════════════════════════════════
//   COLOR DITHER ENGINE (AUTENTNE 256 VÄRVI + KONTRAST)
// ════════════════════════════════════════════════════

// Genereerime klassikalise 90ndate 8-bitise "Web-Safe" paleti (6x6x6 värvikuubik + 40 halltooni stabiilsuse jaoks)
const PALETTE = [];
for (let r = 0; r < 6; r++) {
  for (let g = 0; g < 6; g++) {
    for (let b = 0; b < 6; b++) {
      PALETTE.push([r * 51, g * 51, b * 51]);
    }
  }
}
while (PALETTE.length < 256) {
  let v = Math.round((PALETTE.length - 216) * (255 / 39));
  PALETTE.push([v, v, v]);
}

// Leiab paletist kõige lähedama matemaatilise värvi
function getClosestPaletteColor(r, g, b) {
  let minDist = Infinity;
  let closest = PALETTE[0];
  for (let i = 0; i < PALETTE.length; i++) {
    const p = PALETTE[i];
    const dist = (r - p[0])**2 + (g - p[1])**2 + (b - p[2])**2;
    if (dist < minDist) {
      minDist = dist;
      closest = p;
    }
  }
  return closest;
}

function processRetroImage(img) {
  const canvas = document.createElement('canvas');
  const ctx = canvas.getContext('2d');
  
  // Väga madal resolutsioon mälu säästmiseks ja 90s pikslite efekti saavutamiseks
  const maxW = 200; 
  let w = img.width;
  let h = img.height;
  if (w > maxW) {
    h = Math.floor((maxW / w) * h);
    w = maxW;
  }
  canvas.width = w;
  canvas.height = h;
  
  ctx.drawImage(img, 0, 0, w, h);
  const imgData = ctx.getImageData(0, 0, w, h);
  const d = imgData.data;

  // EEL-TÖÖTLUS: Tõstame kontrasti ja dünaamikat enne ditherdamist, et vältida "valgeks plögaks" sulamist
  const contrastFactor = 1.35; // Suurendab krõbedust ja hoiab detailid eraldi
  for (let i = 0; i < d.length; i += 4) {
    for (let j = 0; j < 3; j++) {
      let val = d[i+j];
      val = ((val / 255 - 0.5) * contrastFactor + 0.5) * 255;
      d[i+j] = Math.min(255, Math.max(0, val));
    }
  }

  // FLOYD-STEINBERG VÄRVILINE DITHERING ALGORITM
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const idx = (y * w + x) * 4;
      const oldR = d[idx];
      const oldG = d[idx+1];
      const oldB = d[idx+2];

      // Leiame 256-värvi paletist vaste (Pildid EI ole enam üleni rohelised!)
      const closest = getClosestPaletteColor(oldR, oldG, oldB);
      
      d[idx]   = closest[0];
      d[idx+1] = closest[1];
      d[idx+2] = closest[2];

      // Kvantimisvea arvutus iga värvikanali jaoks eraldi
      const errR = oldR - closest[0];
      const errG = oldG - closest[1];
      const errB = oldB - closest[2];

      // Vea jaotamine naaberpikslitele
      if (x + 1 < w) {
        let nIdx = idx + 4;
        d[nIdx]   = Math.min(255, Math.max(0, d[nIdx]   + errR * (7 / 16)));
        d[nIdx+1] = Math.min(255, Math.max(0, d[nIdx+1] + errG * (7 / 16)));
        d[nIdx+2] = Math.min(255, Math.max(0, d[nIdx+2] + errB * (7 / 16)));
      }
      if (y + 1 < h) {
        if (x > 0) {
          let nIdx = idx + (w - 1) * 4;
          d[nIdx]   = Math.min(255, Math.max(0, d[nIdx]   + errR * (3 / 16)));
          d[nIdx+1] = Math.min(255, Math.max(0, d[nIdx+1] + errG * (3 / 16)));
          d[nIdx+2] = Math.min(255, Math.max(0, d[nIdx+2] + errB * (3 / 16)));
        }
        let nIdx = idx + w * 4;
        d[nIdx]   = Math.min(255, Math.max(0, d[nIdx]   + errR * (5 / 16)));
        d[nIdx+1] = Math.min(255, Math.max(0, d[nIdx+1] + errG * (5 / 16)));
        d[nIdx+2] = Math.min(255, Math.max(0, d[nIdx+2] + errB * (5 / 16)));
        if (x + 1 < w) {
          let nIdx = idx + (w + 1) * 4;
          d[nIdx]   = Math.min(255, Math.max(0, d[nIdx]   + errR * (1 / 16)));
          d[nIdx+1] = Math.min(255, Math.max(0, d[nIdx+1] + errG * (1 / 16)));
          d[nIdx+2] = Math.min(255, Math.max(0, d[nIdx+2] + errB * (1 / 16)));
        }
      }
    }
  }
  
  ctx.putImageData(imgData, 0, 0);
  return canvas.toDataURL('image/png', 0.4); 
}

// ════════════════════════════════════════════════════
//   RENDER SÕNUM & PILT
// ════════════════════════════════════════════════════

function renderMessage(msgData, msgId, isNew) {
  const area = document.getElementById('messages-area');
  const existing = document.getElementById('msg-' + msgId);
  const isDeleted = (msgData.text === '' && !msgData.base64Img) || msgData.deleted;

  if (isDeleted) {
    if (existing) existing.remove();
    return;
  }

  if (!msgData.saved && msgData.timestamp) {
    if (Date.now() - msgData.timestamp > EXPIRE_MS) {
      remove(ref(db, 'messages/' + msgId)).catch(() => {});
      if (existing) existing.remove();
      return;
    }
  }

  const isAustaja = msgData.user === 'Austaja';
  const userClass = isAustaja ? 'msg-user-admin' : 'msg-user-annilill';

  const sentByOther = msgData.user !== currentUser;
  if (sentByOther && !msgData.seen) {
    update(ref(db, 'messages/' + msgId), { seen: true });
    if (!existing && WORKER_URL && !WORKER_URL.includes('SINUNIMI')) {
      const url = WORKER_URL.startsWith('http') ? WORKER_URL : `https://${WORKER_URL}`;
      fetch(`${url}/notify`, {
        method: 'POST', mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fromUser: currentUser, text: '✓✓ Sõnum loetud', toUser: msgData.user })
      }).catch(() => {});
    }
  }

  let statusHtml = '';
  if (msgData.user === currentUser) {
    const statusClass = msgData.seen ? 'status-seen' : 'status-delivered';
    const statusText = msgData.seen ? '✓✓ loetud' : '✓ kohale jõudnud';
    statusHtml = `<span class="msg-status ${statusClass}">[${statusText}]</span>`;
  }

  let expiryHtml = '';
  if (!msgData.saved && msgData.timestamp) {
    const remaining = EXPIRE_MS - (Date.now() - msgData.timestamp);
    if (remaining < 2 * 3600000) {
      const h = Math.floor(remaining / 3600000);
      const m = Math.floor((remaining % 3600000) / 60000);
      expiryHtml = `<span class="msg-expiry soon">[aegub ${h}h ${m}m]</span>`;
    }
  }
  if (msgData.saved) expiryHtml = `<span class="msg-expiry" style="color:#00AAFF;">[salvestatud]</span>`;

  const saveClass = msgData.saved ? 'act-btn-save saved' : 'act-btn-save';
  const saveLabel = msgData.saved ? '[♦]' : '[♢]';
  const heartClass = msgData.hearted ? 'act-btn-heart hearted' : 'act-btn-heart';
  const heartLabel = msgData.hearted ? '[♥]' : '[♡]';

  const actionsHtml = `<span class="msg-actions">` +
    `<button class="${saveClass}" onclick="saveMsg('${msgId}',${!!msgData.saved})">${saveLabel}</button>` +
    `<button class="act-btn-heart ${heartClass}" onclick="heartMsg('${msgId}',${!!msgData.hearted})">${heartLabel}</button>` +
    `<button class="act-btn-edit" onclick="editMsg('${msgId}',this)">[~]</button>` +
    `<button class="act-btn-del" onclick="deleteMsg('${msgId}')">[x]</button>` +
    `</span>`;

  let contentHtml = '';
  if (msgData.text) {
    contentHtml += `<span class="msg-text" id="txt-${msgId}">${escapeHtml(msgData.text)}</span>`;
  }
  if (msgData.base64Img) {
    contentHtml += `<img src="${msgData.base64Img}" class="msg-dithered-img" alt="Dithered Payload" />`;
  }

  const html =
    `<span class="msg-ts">[${formatTime(msgData.timestamp)}]</span> ` +
    `<span class="${userClass}">${escapeHtml(msgData.user)}</span>` +
    `<span class="msg-colon">:</span> ` +
    contentHtml + statusHtml + expiryHtml + actionsHtml;

  if (existing) {
    existing.innerHTML = html;
  } else {
    if (document.getElementById('msg-' + msgId)) {
      document.getElementById('msg-' + msgId).innerHTML = html;
      return;
    }

    const line = document.createElement('div');
    line.className = 'msg-line';
    line.id = 'msg-' + msgId;
    line.innerHTML = html;
    
    let inserted = false;
    const allLines = area.querySelectorAll('.msg-line');
    for (const el of allLines) {
      const elMsg = el._msgTs;
      if (elMsg && msgData.timestamp && elMsg > msgData.timestamp) {
        area.insertBefore(line, el);
        inserted = true;
        break;
      }
    }
    if (!inserted) {
      maybeInsertDaySeparator(area, msgData.timestamp);
      area.appendChild(line);
      if (isNew) area.scrollTop = area.scrollHeight;
    }
    line._msgTs = msgData.timestamp;
  }
}

// ════════════════════════════════════════════════════
//   AUTOMAATNE MEELDETULETUSTE KONTROLL
// ════════════════════════════════════════════════════

function scanAndRemindUnreadMessages(data) {
  if (!data || !WORKER_URL || WORKER_URL.includes('SINUNIMI')) return;
  
  const now = Date.now();
  const url = WORKER_URL.startsWith('http') ? WORKER_URL : `https://${WORKER_URL}`;

  Object.entries(data).forEach(([id, msg]) => {
    if (msg.timestamp && msg.seen === false && (msg.text !== '' || msg.base64Img)) {
      const timePassed = now - msg.timestamp;

      if (timePassed >= REMINDER_TRIGGER_MS) {
        const lastRemindedKey = 'reminded:' + id;
        const lastRemindedTime = parseInt(localStorage.getItem(lastRemindedKey) || '0');

        if (now - lastRemindedTime > 60 * 60 * 1000) { 
          localStorage.setItem(lastRemindedKey, now);

          const targetUser = msg.user === 'Annilill' ? 'Austaja' : 'Annilill';
          const notifText = msg.base64Img ? '[Pilt]' : msg.text;
          
          fetch(`${url}/notify`, {
            method: 'POST', mode: 'cors',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
              fromUser: msg.user, 
              text: `kordusteavitus: ${notifText}`, 
              toUser: targetUser 
            })
          }).catch((err) => console.error('Meeldetuletuse saates tekkis viga:', err));
        }
      }
    }
  });
}

// ════════════════════════════════════════════════════
//   MESSAGE ACTIONS
// ════════════════════════════════════════════════════

window.saveMsg = async function(msgId, isSaved) {
  try {
    await update(ref(db, 'messages/' + msgId), { saved: !isSaved });
    sysMsg(isSaved ? '[ Salvestus eemaldatud ]' : '[ ♦ Sõnum salvestatud — ei aegu ]');
  } catch(e) { sysMsg('[ VIGA salvestamisel: ' + e.message + ' ]'); }
};

window.heartMsg = async function(msgId, isHearted) {
  try {
    const newVal = !isHearted;
    await update(ref(db, 'messages/' + msgId), { hearted: newVal });
    if (newVal && WORKER_URL && !WORKER_URL.includes('SINUNIMI')) {
      const url = WORKER_URL.startsWith('http') ? WORKER_URL : `https://${WORKER_URL}`;
      const toUser = currentUser === 'Annilill' ? 'Austaja' : 'Annilill';
      fetch(`${url}/notify`, {
        method: 'POST', mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fromUser: currentUser, text: '♥ Sõnumile lisati süda', toUser })
      }).catch(() => {});
    }
  } catch(e) { sysMsg('[ VIGA: ' + e.message + ' ]'); }
};

window.editMsg = function(msgId, btn) {
  const txtEl = document.getElementById('txt-' + msgId);
  if (!txtEl) return;
  const current = txtEl.textContent;
  const input = document.createElement('input');
  input.type = 'text';
  input.value = current;
  input.style.cssText = 'background:transparent;border:none;border-bottom:1px solid #00AA00;color:#00FF00;font-family:"Courier New",monospace;font-size:14px;outline:none;width:300px;';
  txtEl.replaceWith(input);
  input.focus();
  input.select();

  const save = async () => {
    const newText = input.value.trim();
    if (newText && newText !== current) {
      try {
        await update(ref(db, 'messages/' + msgId), { text: newText, edited: true });
        sysMsg('[ Sõnum muudetud ]');
      } catch(e) { sysMsg('[ VIGA muutmisel: ' + e.message + ' ]'); }
    }
  };
  input.addEventListener('keydown', async (e) => {
    if (e.key === 'Enter' && initialized) await save();
    if (e.key === 'Escape') location.reload();
  });
  input.addEventListener('blur', save);
};

window.deleteMsg = async function(msgId) {
  try {
    await remove(ref(db, 'messages/' + msgId));
  } catch(e) { sysMsg('[ VIGA kustutamisel: ' + e.message + ' ]'); }
};

// ════════════════════════════════════════════════════
//   LISTEN MESSAGES & TYPING
// ════════════════════════════════════════════════════

function listenMessages() {
  const statusBar = document.getElementById('status-bar');
  statusBar.textContent = '● LIVE';
  statusBar.style.color = '#00FF00';

  let historyLoaded = false;
  onValue(query(msgsRef, limitToLast(200)), (snapshot) => {
    const data = snapshot.val();
    const area = document.getElementById('messages-area');

    if (!historyLoaded) {
      area.innerHTML = '';
      lastRenderedDay = null; 
    }

    if (!data) { 
      sysMsg('[ Tere tulemast. ]'); 
      historyLoaded = true; 
      return; 
    }

    scanAndRemindUnreadMessages(data);

    area.querySelectorAll('.msg-line').forEach(el => {
      const id = el.id.replace('msg-', '');
      if (!data[id]) el.remove();
    });

    const sortedEntries = Object.entries(data).sort((a, b) => {
      return (a[1].timestamp || 0) - (b[1].timestamp || 0);
    });

    sortedEntries.forEach(([id, msg]) => {
      renderMessage(msg, id, historyLoaded);
    });
    
    historyLoaded = true;
  }, (error) => {
    statusBar.textContent = '✗ CONNECTION LOST';
    statusBar.style.color = '#FF3333';
    sysMsg('[ VIGA: ' + error.message + ' ]');
  });
}

function listenTyping() {
  const otherUser = currentUser === 'Annilill' ? 'Austaja' : 'Annilill';
  onValue(ref(db, 'typing/' + otherUser), (snapshot) => {
    const isTyping = snapshot.val() === true;
    document.getElementById('typing-indicator').textContent =
      isTyping ? otherUser + ' kirjutab...' : '';
  });
}

function setTyping(isTyping) {
  if (!typingRef) return;
  set(ref(db, 'typing/' + currentUser), isTyping || null);
}

// ════════════════════════════════════════════════════
//   SEND MESSAGE 
// ════════════════════════════════════════════════════

async function sendMessage(text, base64Img = null) {
  if ((!text.trim() && !base64Img) || !db) return;
  
  const loader = document.getElementById('loader');
  loader.style.display = 'block';

  setTyping(false);
  if (typingTimeout) { clearTimeout(typingTimeout); typingTimeout = null; }

  try {
    const payload = {
      user: currentUser,
      text: text.trim(),
      timestamp: serverTimestamp(),
      seen: false
    };
    
    if (base64Img) payload.base64Img = base64Img;

    await push(msgsRef, payload);

    if (WORKER_URL && !WORKER_URL.includes('SINUNIMI')) {
      const url = WORKER_URL.startsWith('http') ? WORKER_URL : `https://${WORKER_URL}`;
      const pushText = base64Img ? '📷 Saatis retro-pildi...' : text.trim();
      fetch(`${url}/notify`, {
        method: 'POST',
        mode: 'cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fromUser: currentUser, text: pushText })
      }).catch(() => {});
    }
  } catch(e) {
    sysMsg('[ SAATMINE EBAÕNNESTUS: ' + e.message + ' ]');
  } finally {
    loader.style.display = 'none';
  }
}

// ════════════════════════════════════════════════════
//   IMAGE SELECT & BINDING LOOGIKA
// ════════════════════════════════════════════════════

function bindImageEvents() {
  const fileInput = document.getElementById('img-file-input');
  if (!fileInput) return;
  
  fileInput.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;

    sysMsg('[ Tihendan ja ditherdan retro-pilti... ]');

    const reader = new FileReader();
    reader.onload = function(event) {
      const img = new Image();
      img.onload = function() {
        setTimeout(async () => {
          try {
            const ditheredBase64 = processRetroImage(img);
            await sendMessage('', ditheredBase64);
          } catch(err) {
            sysMsg('[ RETRO-ENGINE VIGA töötlemisel: ' + err.message + ' ]');
          }
        }, 50);
      };
      img.src = event.target.result;
    };
    reader.readAsDataURL(file);
    e.target.value = ''; 
  });
}

// ════════════════════════════════════════════════════
//   INPUT EVENTS
// ════════════════════════════════════════════════════

document.getElementById('pass-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && initialized) login(e.target.value);
});

document.getElementById('msg-input').addEventListener('keydown', async (e) => {
  if (e.key === 'Enter' && initialized) {
    const val = e.target.value;
    if (val.trim()) {
      await sendMessage(val);
      e.target.value = '';
    }
  }
});

document.getElementById('msg-input').addEventListener('input', () => {
  if (!initialized) return;
  setTyping(true);
  if (typingTimeout) clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => setTyping(false), 3000);
});

// ════════════════════════════════════════════════════
//   NOTIFICATIONS & FCM
// ════════════════════════════════════════════════════

function checkNotificationSupport() { return 'Notification' in window && 'serviceWorker' in navigator; }
function isNotifGranted() { return checkNotificationSupport() && Notification.permission === 'granted'; }

function updateNotifBanner() {
  const banner = document.getElementById('notif-banner');
  if (!banner || !checkNotificationSupport()) return;
  if (Notification.permission === 'granted') {
    banner.classList.remove('visible');
  } else {
    banner.classList.add('visible');
    if (Notification.permission === 'denied') {
      document.getElementById('notif-warning-text').textContent = '⚠ TEAVITUSED ON BLOKEERITUD';
      document.getElementById('notif-enable-btn').style.display = 'none';
    }
  }
}

async function initFCM() {
  if (swReady) return;
  swReady = true;
  try {
    swReg = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
    await navigator.serviceWorker.ready;
    const token = await getToken(getMessaging(), { vapidKey: VAPID_KEY, serviceWorkerRegistration: swReg });
    if (!token) throw new Error('FCM token puudub');

    const url = WORKER_URL.startsWith('http') ? WORKER_URL : `https://${WORKER_URL}`;
    const res = await fetch(`${url}/register`, {
      method: 'POST', mode: 'cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, user: currentUser })
    });
    if (!res.ok) throw new Error('Worker register failed: ' + res.status);
    updateNotifBanner();
  } catch(e) {
    swReady = false;
    sysMsg('[ ✗ Push teavituste viga: ' + e.message + ' ]');
  }
}

async function requestNotifPermission() {
  if (!checkNotificationSupport()) return;
  try {
    const result = await Notification.requestPermission();
    if (result === 'granted') await initFCM();
    else updateNotifBanner();
  } catch(e) {
    sysMsg('[ VIGA teavituste lubamisel: ' + e.message + ' ]');
  }
}

document.getElementById('notif-enable-btn').addEventListener('click', requestNotifPermission);

async function checkMissedMessages() {
  const lastSeenKey = 'lastSeen:' + currentUser;
  const lastSeen = parseInt(localStorage.getItem(lastSeenKey) || '0');
  localStorage.setItem(lastSeenKey, Date.now());
  if (!lastSeen || Date.now() - lastSeen < 30000) return;

  try {
    const { get, query: fbQuery, orderByChild, startAfter } =
      await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js");
    const snapshot = await get(fbQuery(msgsRef, orderByChild('timestamp'), startAfter(lastSeen)));
    if (!snapshot.exists()) return;
    const missed = Object.values(snapshot.val()).filter(m => m.user !== currentUser && (m.text !== '' || m.base64Img));
    if (!missed.length) return;
  } catch(e) { console.log('checkMissedMessages:', e.message); }
}
