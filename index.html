<!DOCTYPE html>
<html lang="et">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#00FF00">
<link rel="icon" type="image/png" href="./ikoon.png">
<link rel="apple-touch-icon" href="./ikoon.png">
<title>KERNEL_TERMINAL v4.2.1</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #00FF00;
    --green-dim: #00AA00;
    --green-dark: #003300;
    --amber: #FFB000;
    --red: #FF3333;
    --bg: #000000;
    --font: monospace;
  }

  body {
    background: var(--bg);
    color: var(--green);
    font-family: var(--font);
    font-size: 14px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── BOOT SCREEN & LOGO FIXED ── */
  #boot-screen {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 1.5rem;
    width: 100%;
  }

  #logo-container {
    width: 100%;
    max-width: 440px;
    margin-bottom: 1.5rem;
    display: flex;
    justify-content: center;
    padding: 0 10px;
    color: var(--green); /* SVG fill="currentColor" nopib selle värvi üles */
  }

  #terminal-logo {
    width: 100%;
    height: auto;
    display: block;
    object-fit: contain; /* Lukustab proportsioonid, et read ei uju ega lagune mobiilis */
  }

  .boot-line {
    color: var(--green-dim);
    font-size: 12px;
    margin: 2px 0;
    opacity: 0;
    animation: fadeIn 0.1s forwards;
  }

  @keyframes fadeIn { to { opacity: 1; } }

  #login-box {
    border: 1px solid var(--green);
    padding: 1.5rem;
    width: 100%;
    max-width: 400px;
    margin-top: 1rem;
  }

  #login-box .title {
    font-size: 16px;
    margin-bottom: 1rem;
    text-align: center;
    letter-spacing: 2px;
  }

  #login-box .field {
    display: flex;
    align-items: center;
    margin: 0.5rem 0;
  }

  #login-box .field label {
    color: var(--green-dim);
    width: 110px;
    flex-shrink: 0;
  }

  #login-box .field input {
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--green-dim);
    color: var(--green);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    flex: 1;
    padding: 2px 4px;
    letter-spacing: 2px;
  }

  #login-error { color: var(--red); font-size: 12px; margin-top: 0.5rem; min-height: 18px; }

  /* ── TERMINAL ── */
  #terminal {
    display: none;
    flex-direction: column;
    flex: 1;
    overflow: hidden;
  }

  #topbar {
    background: var(--green-dark);
    border-bottom: 1px solid var(--green-dim);
    padding: 6px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 5px;
    font-size: 11px;
  }

  #topbar .user-info { color: var(--amber); }

  /* ── BANNERS FLEXIBLE MOBIILI FIX ── */
  #notif-banner, #pwa-banner {
    display: none;
    background: #0a0000;
    border-bottom: 1px solid var(--red);
    padding: 8px 12px;
    align-items: center;
    gap: 10px;
    font-size: 11px;
    letter-spacing: 1px;
    flex-wrap: wrap; /* Lubab tekstil mobiilis reaks murduda, ei uju ekraanilt välja */
  }
  #notif-banner { justify-content: space-between; }
  #notif-banner.visible, #pwa-banner.visible { display: flex; }

  #notif-warning-text {
    color: var(--red);
    animation: redBlink 0.9s step-end infinite;
  }
  @keyframes redBlink { 50% { opacity: 0; } }

  #notif-enable-btn {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    font-family: var(--font);
    font-size: 11px;
    padding: 2px 8px;
    cursor: pointer;
  }
  #notif-enable-btn:hover { background: var(--red); color: #000; }

  /* ── MESSAGES ── */
  #messages-area {
    flex: 1;
    overflow-y: auto;
    padding: 0.75rem 1rem;
    scroll-behavior: smooth;
  }

  #messages-area::-webkit-scrollbar { width: 4px; }
  #messages-area::-webkit-scrollbar-track { background: #001100; }
  #messages-area::-webkit-scrollbar-thumb { background: var(--green-dim); }

  .msg-line {
    margin: 4px 0;
    line-height: 1.4;
    word-break: break-word;
    opacity: 0;
    animation: fadeIn 0.2s forwards;
  }

  .msg-ts { color: var(--green-dim); }
  .msg-user-annilill { color: #00DDFF; }
  .msg-user-admin { color: var(--amber); }
  .msg-colon { color: var(--green-dim); }
  .msg-text { color: var(--green); }
  .msg-status { font-size: 11px; margin-left: 6px; }
  .status-seen { color: #00AAFF; }
  .status-delivered { color: var(--green-dim); }

  .day-separator {
    text-align: center;
    color: var(--green-dim);
    font-size: 11px;
    margin: 14px 0 6px;
    letter-spacing: 2px;
    border-top: 1px solid #002200;
    padding-top: 6px;
  }

  .msg-actions button {
    background: transparent;
    border: none;
    font-family: var(--font);
    font-size: 11px;
    cursor: pointer;
    padding: 0 3px;
    opacity: 0.4;
  }
  .act-btn-save { color: #00AA00; }
  .act-btn-save:hover, .act-btn-heart:hover, .act-btn-edit:hover, .act-btn-del:hover { opacity: 1; }
  .act-btn-save.saved { color: #00FFFF; opacity: 1; }
  .act-btn-heart { color: #FF6699; }
  .act-btn-heart.hearted { color: #FF2266; opacity: 1; }
  .act-btn-edit, .act-btn-del { color: var(--red); }

  .msg-expiry { font-size: 10px; color: #444; margin-left: 4px; }
  .msg-expiry.soon { color: #884400; }

  .sys-msg {
    color: var(--green-dim);
    font-size: 12px;
    font-style: italic;
    margin: 4px 0;
  }

  #typing-indicator {
    color: var(--green-dim);
    font-size: 11px;
    font-style: italic;
    padding: 2px 1rem;
    min-height: 18px;
  }

  /* ── INPUT ── */
  #input-area {
    border-top: 1px solid var(--green-dim);
    padding: 10px 12px;
    display: flex;
    align-items: center;
    gap: 6px;
    background: #000800;
  }

  #prompt-label { color: var(--green); white-space: nowrap; font-size: 13px; }
  #msg-input {
    background: transparent;
    border: none;
    color: var(--green);
    font-family: var(--font);
    font-size: 14px;
    outline: none;
    flex: 1;
  }

  .cursor-blink {
    display: inline-block;
    width: 8px;
    height: 14px;
    background: var(--green);
    animation: blink 1s step-end infinite;
    margin-left: 2px;
  }
  @keyframes blink { 50% { opacity: 0; } }

  #loader { display: none; color: var(--green-dim); font-size: 12px; padding: 4px 12px; }

  .scanline {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(0deg, rgba(0,255,0,0.01) 0px, rgba(0,255,0,0.01) 1px, transparent 1px, transparent 2px);
    pointer-events: none;
    z-index: 999;
  }
</style>
</head>
<body>

<div class="scanline"></div>

<div id="boot-screen">
  <div id="logo-container">
    <img src="./logo.svg" id="terminal-logo" alt="KERNEL LOGO" onerror="this.style.display='none';">
  </div>
  <div style="color:#00AA00;font-size:11px;letter-spacing:2px;margin-bottom:1.5rem;text-align:center;">── SECURE TERMINAL v4.2.1 ──</div>
  <div id="boot-lines"></div>

  <div id="login-box" style="display:none">
    <div class="title">▶ SISSELOGIMINE ◀</div>
    <div class="field">
      <label>ACCESS_CODE:</label>
      <input type="password" id="pass-input" autocomplete="off" spellcheck="false" />
    </div>
    <div id="login-error"></div>
    <div id="login-hint">[ Sisesta kood ja vajuta ENTER ]</div>
  </div>
</div>

<div id="terminal">
  <div id="topbar">
    <div>KERNEL_TERM 4.2.1 | SECURE | <span id="clock"></span></div>
    <div>USER: <span id="current-user-label" class="user-info"></span></div>
    <div id="status-bar">● CONNECTING...</div>
  </div>
  <div id="notif-banner">
    <span id="notif-warning-text">⚠ TEAVITUSED POLE LUBATUD — SÕNUMID VÕIVAD HILINEDA</span>
    <button id="notif-enable-btn">[ LUBA ]</button>
  </div>
  <div id="pwa-banner"></div>
  <div id="messages-area"></div>
  <div id="typing-indicator"></div>
  <div id="loader">[ transmitting... ]</div>
  <div id="input-area">
    <span id="prompt-label">&gt;</span>
    <input type="text" id="msg-input" placeholder="Kirjuta sõnum..." autocomplete="off" spellcheck="false" maxlength="500" />
    <span class="cursor-blink"></span>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, serverTimestamp, update, query, limitToLast, set, get, remove, orderByChild, startAfter }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
import { getMessaging, getToken }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-messaging.js";

const firebaseConfig = {
  apiKey: "AIzaSyCW1sTAjhIEMGddqplM7TQ-Wc0eLYWhRSQ",
  authDomain: "kernel-chat-8b669.firebaseapp.com",
  databaseURL: "https://kernel-chat-8b669-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kernel-chat-8b669",
  storageBucket: "kernel-chat-8b669.firebasestorage.app",
  messagingSenderId: "70231400069",
  appId: "1:70231400069:web:8e62e67bd7c2efb28553ec"
};

const USERS = { "vaheleitea": "Annilill", "87655": "Austaja" };
const EXPIRE_MS = 24 * 60 * 60 * 1000;
const WORKER_URL = 'kernel-push.annilille-salajane-austaja.workers.dev';
const VAPID_KEY  = 'BHjCejG7QdVqLZsH3LdXXIGDzjR0UruNaRu-sm3pt-nLiQgxb3KYxokcIoTXQAoLoedeLkCErSmPag5-xHMdXQg';

let currentUser = null, db = null, msgsRef = null, typingRef = null, initialized = false, swReady = false, typingTimeout = null, lastRenderedDay = null;

const bootLines = [
  "BIOS v2.4.1 ... OK", "Loading kernel modules ... OK", "Mounting encrypted filesystem ... OK",
  "Connecting to 32KK_SERVER ... OK", "Initializing secure channel ... OK", "Establishing Firebase connection ... OK",
  "", "SÜSTEEM ON VALMIS."
];

async function boot() {
  const container = document.getElementById('boot-lines');
  for (const line of bootLines) {
    await new Promise(r => setTimeout(r, 60 + Math.random() * 40));
    const el = document.createElement('div');
    el.className = 'boot-line';
    el.textContent = line;
    el.style.color = line.includes('OK') ? '#00AA00' : line === '' ? 'transparent' : '#007700';
    container.appendChild(el);
  }
  
  const savedUser = localStorage.getItem('kernel_session_user');
  if (savedUser && Object.values(USERS).includes(savedUser)) {
    loginAsUser(savedUser);
  } else {
    document.getElementById('login-box').style.display = 'block';
    document.getElementById('pass-input').focus();
  }
}

function login(password) {
  const username = USERS[password.trim()];
  if (!username) {
    const errEl = document.getElementById('login-error');
    errEl.textContent = '✗ ACCESS DENIED';
    document.getElementById('pass-input').value = '';
    setTimeout(() => errEl.textContent = '', 3000);
    return;
  }
  loginAsUser(username);
}

function loginAsUser(username) {
  currentUser = username;
  localStorage.setItem('kernel_session_user', username);

  try {
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
    msgsRef = ref(db, 'messages');
    typingRef = ref(db, 'typing');
  } catch(e) {
    document.getElementById('login-error').textContent = '✗ DB CONNECTION FAILED';
    return;
  }

  document.getElementById('boot-screen').style.display = 'none';
  document.getElementById('terminal').style.display = 'flex';
  document.getElementById('current-user-label').textContent = currentUser;
  document.getElementById('msg-input').focus();

  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('et-EE', {hour12: false});
  }, 1000);

  listenMessages();
  listenTyping();
  initialized = true;

  updateNotifBanner();
  checkMissedMessages();
  if (isNotifGranted()) initFCM();
}

function formatTime(ts) {
  return ts ? new Date(ts).toLocaleTimeString('et-EE', {hour: '2-digit', minute: '2-digit', hour12: false}) : '??:??';
}

function formatDate(ts) {
  if (!ts) return '';
  const d = new Date(ts), today = new Date(), yesterday = new Date(today);
  yesterday.setDate(today.getDate() - 1);
  if (d.toDateString() === today.toDateString()) return '── TÄNA ──';
  if (d.toDateString() === yesterday.toDateString()) return '── EILE ──';
  return '── ' + d.toLocaleDateString('et-EE', {day:'numeric', month:'long', year:'numeric'}).toUpperCase() + ' ──';
}

function sysMsg(text) {
  const area = document.getElementById('messages-area');
  const el = document.createElement('div');
  el.className = 'sys-msg';
  el.textContent = text;
  area.appendChild(el);
  area.scrollTop = area.scrollHeight;
}

function renderMessage(msgData, msgId, isNew) {
  const area = document.getElementById('messages-area');
  const existing = document.getElementById('msg-' + msgId);

  if (msgData.text === '' || msgData.deleted) {
    if (existing) existing.remove();
    return;
  }

  if (!msgData.saved && msgData.timestamp && (Date.now() - msgData.timestamp > EXPIRE_MS)) {
    remove(ref(db, 'messages/' + msgId)).catch(() => {});
    if (existing) existing.remove();
    return;
  }

  if (msgData.user !== currentUser && !msgData.seen) {
    update(ref(db, 'messages/' + msgId), { seen: true });
    if (!existing && WORKER_URL) {
      const url = WORKER_URL.startsWith('http') ? WORKER_URL : `https://${WORKER_URL}`;
      fetch(`${url}/notify`, {
        method: 'POST', mode: 'cors', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ fromUser: currentUser, text: '✓✓ Sõnum loetud', toUser: msgData.user })
      }).catch(() => {});
    }
  }

  let statusHtml = msgData.user === currentUser ? `<span class="msg-status ${msgData.seen ? 'status-seen' : 'status-delivered'}">[${msgData.seen ? '✓✓ loetud' : '✓ kohal'}]</span>` : '';
  let expiryHtml = msgData.saved ? `<span class="msg-expiry" style="color:#00AAFF;">[salvestatud]</span>` : '';
  
  if (!msgData.saved && msgData.timestamp) {
    const remaining = EXPIRE_MS - (Date.now() - msgData.timestamp);
    if (remaining < 2 * 3600000) {
      expiryHtml = `<span class="msg-expiry soon">[aegub ${Math.floor(remaining / 3600000)}h ${Math.floor((remaining % 3600000) / 60000)}m]</span>`;
    }
  }

  const html = `<span class="msg-ts">[${formatTime(msgData.timestamp)}]</span> ` +
    `<span class="${msgData.user === 'Austaja' ? 'msg-user-admin' : 'msg-user-annilill'}">${msgData.user}</span>` +
    `<span class="msg-colon">:</span> <span class="msg-text" id="txt-${msgId}">${msgData.text}</span>` +
    statusHtml + (msgData.edited ? `<span class="msg-expiry" style="color:#555;">[muudetud]</span>` : '') + expiryHtml +
    `<span class="msg-actions">` +
      `<button class="act-btn-save ${msgData.saved ? 'saved' : ''}" onclick="saveMsg('${msgId}',${!!msgData.saved})">${msgData.saved ? '[♦]' : '[♢]'}</button>` +
      `<button class="act-btn-heart ${msgData.hearted ? 'hearted' : ''}" onclick="heartMsg('${msgId}',${!!msgData.hearted})">${msgData.hearted ? '[♥]' : '[♡]'}</button>` +
      `<button onclick="editMsg('${msgId}')">[~]</button><button onclick="deleteMsg('${msgId}')">[x]</button>` +
    `</span>`;

  if (existing) {
    existing.innerHTML = html;
  } else {
    const dayKey = msgData.timestamp ? new Date(msgData.timestamp).toDateString() : null;
    if (dayKey && dayKey !== lastRenderedDay) {
      lastRenderedDay = dayKey;
      const sep = document.createElement('div');
      sep.className = 'day-separator';
      sep.textContent = formatDate(msgData.timestamp);
      area.appendChild(sep);
    }

    const line = document.createElement('div');
    line.className = 'msg-line';
    line.id = 'msg-' + msgId;
    line.innerHTML = html;
    area.appendChild(line);
    if (isNew) area.scrollTop = area.scrollHeight;
  }
}

window.saveMsg = async (msgId, isSaved) => { await update(ref(db, 'messages/' + msgId), { saved: !isSaved }); };

window.heartMsg = async (msgId, isHearted) => {
  const newVal = !isHearted;
  await update(ref(db, 'messages/' + msgId), { hearted: newVal });
  if (newVal && WORKER_URL) {
    const url = WORKER_URL.startsWith('http') ? WORKER_URL : `https://${WORKER_URL}`;
    fetch(`${url}/notify`, {
      method: 'POST', mode: 'cors', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fromUser: currentUser, text: '♥ Lisas südamemärgi', toUser: currentUser === 'Annilill' ? 'Austaja' : 'Annilill' })
    }).catch(() => {});
  }
};

window.editMsg = function(msgId) {
  const txtEl = document.getElementById('txt-' + msgId);
  if (!txtEl) return;
  const current = txtEl.textContent, input = document.createElement('input');
  input.type = 'text'; input.value = current;
  input.style.cssText = 'background:transparent;border:none;border-bottom:1px solid #00AA00;color:#00FF00;font-family:monospace;font-size:14px;outline:none;width:75%;';
  txtEl.replaceWith(input);
  input.focus();

  const save = async () => {
    if (input.value.trim() && input.value.trim() !== current) {
      await update(ref(db, 'messages/' + msgId), { text: input.value.trim(), edited: true });
    } else { location.reload(); }
  };
  input.addEventListener('keydown', async (e) => { if (e.key === 'Enter') await save(); });
  input.addEventListener('blur', save);
};

window.deleteMsg = async (msgId) => { await remove(ref(db, 'messages/' + msgId)); };

function listenMessages() {
  const statusBar = document.getElementById('status-bar');
  statusBar.textContent = '● LIVE'; statusBar.style.color = '#00FF00';
  
  const area = document.getElementById('messages-area');
  let loaded = false;

  onValue(query(msgsRef, limitToLast(150)), (snapshot) => {
    const data = snapshot.val();
    if (!data) { sysMsg('[ Kanal on tühi. ]'); loaded = true; return; }

    area.querySelectorAll('.msg-line').forEach(el => {
      if (!data[el.id.replace('msg-', '')]) el.remove();
    });

    // See parandab sõnumite ja kuupäevade topeldamise alglaadimisel!
    lastRenderedDay = null; 
    area.innerHTML = ''; 

    Object.entries(data).forEach(([id, msg]) => renderMessage(msg, id, loaded));
    loaded = true;
  });
}

function listenTyping() {
  const other = currentUser === 'Annilill' ? 'Austaja' : 'Annilill';
  onValue(ref(db, 'typing/' + other), (snap) => {
    document.getElementById('typing-indicator').textContent = snap.val() ? other + ' kirjutab...' : '';
  });
}

async function sendMessage(text) {
  if (!text.trim() || !db) return;
  set(ref(db, 'typing/' + currentUser), null);
  
  await push(msgsRef, { user: currentUser, text: text.trim(), timestamp: serverTimestamp(), seen: false });
  if (WORKER_URL) {
    const url = WORKER_URL.startsWith('http') ? WORKER_URL : `https://${WORKER_URL}`;
    fetch(`${url}/notify`, {
      method: 'POST', mode: 'cors', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fromUser: currentUser, text: text.trim() })
    }).catch(() => {});
  }
}

document.getElementById('pass-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') login(e.target.value); });
document.getElementById('msg-input').addEventListener('keydown', async (e) => {
  if (e.key === 'Enter' && initialized && e.target.value.trim()) {
    await sendMessage(e.target.value);
    e.target.value = '';
  }
});

document.getElementById('msg-input').addEventListener('input', () => {
  if (!initialized) return;
  set(ref(db, 'typing/' + currentUser), true);
  if (typingTimeout) clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => set(ref(db, 'typing/' + currentUser), null), 2500);
});

function checkNotificationSupport() { return 'Notification' in window && 'serviceWorker' in navigator; }
function isNotifGranted() { return checkNotificationSupport() && Notification.permission === 'granted'; }

function updateNotifBanner() {
  const banner = document.getElementById('notif-banner');
  if (!banner || !checkNotificationSupport()) return;
  if (Notification.permission === 'granted') banner.classList.remove('visible');
  else banner.classList.add('visible');
}

async function initFCM() {
  if (swReady) return; swReady = true;
  try {
    const reg = await navigator.serviceWorker.register('./firebase-messaging-sw.js');
    const token = await getToken(getMessaging(), { vapidKey: VAPID_KEY, serviceWorkerRegistration: reg });
    if (token) {
      const url = WORKER_URL.startsWith('http') ? WORKER_URL : `https://${WORKER_URL}`;
      await fetch(`${url}/register`, {
        method: 'POST', mode: 'cors', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, user: currentUser })
      });
    }
  } catch(e) { swReady = false; }
}

document.getElementById('notif-enable-btn').addEventListener('click', async () => {
  if (checkNotificationSupport()) {
    if (await Notification.requestPermission() === 'granted') await initFCM();
    updateNotifBanner();
  }
});

// Rangem kontroll — kontrollib reaalselt uusi sõnumeid pärast viimast avamist
async function checkMissedMessages() {
  const lastSeenKey = 'lastSeen:' + currentUser;
  const lastSeen = parseInt(localStorage.getItem(lastSeenKey) || '0');
  localStorage.setItem(lastSeenKey, Date.now());

  window.addEventListener('beforeunload', () => localStorage.setItem(lastSeenKey, Date.now()));

  if (!lastSeen) return;
  try {
    const snapshot = await get(query(msgsRef, orderByChild('timestamp'), startAfter(lastSeen)));
    if (snapshot.exists()) {
      const missed = Object.values(snapshot.val()).filter(m => m.user !== currentUser && !m.seen && m.text !== '');
      if (missed.length > 0) {
        sysMsg(`[ Sinu eemalolekul saabus ${missed.length} uut sõnumit. ]`);
      }
    }
  } catch(e) { console.log(e); }
}
